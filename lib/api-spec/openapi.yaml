openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Cleaning task operations
  - name: completions
    description: Task completion operations
  - name: meals
    description: Meal planning operations
  - name: shopping
    description: Shopping list operations
  - name: members
    description: Household member operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all cleaning tasks
      responses:
        "200":
          description: List of cleaning tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CleaningTask"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a cleaning task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleaningTask"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a single cleaning task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The cleaning task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleaningTask"
        "404":
          description: Not found
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a cleaning task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskInput"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleaningTask"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a cleaning task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/due-today:
    get:
      operationId: listTasksDueToday
      tags: [tasks]
      summary: List tasks due today
      responses:
        "200":
          description: Tasks due today
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CleaningTask"

  /tasks/upcoming:
    get:
      operationId: listUpcomingTasks
      tags: [tasks]
      summary: List tasks due in the next 7 days
      responses:
        "200":
          description: Upcoming tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CleaningTask"

  /tasks/stats:
    get:
      operationId: getStats
      tags: [tasks]
      summary: Summary stats for the dashboard
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleStats"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [completions]
      summary: Mark a task as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskInput"
      responses:
        "201":
          description: Completion logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCompletion"
        "404":
          description: Task not found

  /completions:
    get:
      operationId: listCompletions
      tags: [completions]
      summary: List recent completions
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of completions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskCompletion"

  /meals:
    get:
      operationId: listMeals
      tags: [meals]
      summary: List meal plans for a week
      parameters:
        - name: weekStart
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
      responses:
        "200":
          description: List of meal plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealPlan"
    post:
      operationId: createMeal
      tags: [meals]
      summary: Create a meal plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealInput"
      responses:
        "201":
          description: Created meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlan"

  /meals/{id}:
    delete:
      operationId: deleteMealPlan
      tags: [meals]
      summary: Delete a meal plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /shopping:
    get:
      operationId: listShopping
      tags: [shopping]
      summary: List shopping items for a week
      parameters:
        - name: weekStart
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
      responses:
        "200":
          description: List of shopping items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShoppingItem"
    post:
      operationId: createShoppingItem
      tags: [shopping]
      summary: Create a shopping item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShoppingItemInput"
      responses:
        "201":
          description: Created shopping item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingItem"

  /shopping/{id}:
    patch:
      operationId: toggleShoppingItem
      tags: [shopping]
      summary: Update shopping item checked state
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleShoppingItemInput"
      responses:
        "200":
          description: Updated shopping item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingItem"
    delete:
      operationId: deleteShoppingItem
      tags: [shopping]
      summary: Delete a shopping item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members
      responses:
        "200":
          description: List of household members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Create a member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberInput"
      responses:
        "201":
          description: Created member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Delete a member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CleaningTask:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        room:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, monthly, custom]
        customIntervalDays:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        assignedMemberId:
          type: integer
          nullable: true
        assignedMemberName:
          type: string
          nullable: true
        lastCompletedAt:
          type: string
          format: date-time
          nullable: true
        nextDueAt:
          type: string
          format: date-time
          nullable: true
        isOverdue:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - room
        - frequency
        - isOverdue
        - createdAt
        - updatedAt

    CreateTaskInput:
      type: object
      properties:
        name:
          type: string
        room:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, monthly, custom]
        customIntervalDays:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        assignedMemberId:
          type: integer
          nullable: true
      required:
        - name
        - room
        - frequency

    UpdateTaskInput:
      type: object
      properties:
        name:
          type: string
        room:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, monthly, custom]
        customIntervalDays:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        assignedMemberId:
          type: integer
          nullable: true

    TaskCompletion:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        taskName:
          type: string
        room:
          type: string
        completedAt:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
      required:
        - id
        - taskId
        - taskName
        - room
        - completedAt

    CompleteTaskInput:
      type: object
      properties:
        notes:
          type: string
          nullable: true

    ScheduleStats:
      type: object
      properties:
        totalTasks:
          type: integer
        dueTodayCount:
          type: integer
        overdueCount:
          type: integer
        completedThisWeek:
          type: integer
        completedThisMonth:
          type: integer
      required:
        - totalTasks
        - dueTodayCount
        - overdueCount
        - completedThisWeek
        - completedThisMonth

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    CreateMemberInput:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    MealType:
      type: string
      enum: [breakfast, lunch, dinner]

    MealPlan:
      type: object
      properties:
        id:
          type: integer
        weekStart:
          type: string
        dayOfWeek:
          type: integer
        mealType:
          $ref: "#/components/schemas/MealType"
        title:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - weekStart
        - dayOfWeek
        - mealType
        - title
        - createdAt

    CreateMealInput:
      type: object
      properties:
        weekStart:
          type: string
        dayOfWeek:
          type: integer
        mealType:
          $ref: "#/components/schemas/MealType"
        title:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - weekStart
        - dayOfWeek
        - mealType
        - title

    ShoppingItem:
      type: object
      properties:
        id:
          type: integer
        weekStart:
          type: string
        name:
          type: string
        checked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - weekStart
        - name
        - checked
        - createdAt

    CreateShoppingItemInput:
      type: object
      properties:
        weekStart:
          type: string
        name:
          type: string
      required:
        - weekStart
        - name

    ToggleShoppingItemInput:
      type: object
      properties:
        checked:
          type: boolean
      required:
        - checked
